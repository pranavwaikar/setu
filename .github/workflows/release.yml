name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Required for GoReleaser changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install Extension Dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Sync Extension Version with Git Tag
        working-directory: vscode-extension
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json version to: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version

      - name: Package Extension
        working-directory: vscode-extension
        run: npx @vscode/vsce package --no-git-tag-version

      - name: Publish Extension to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: vscode-extension
        run: npx @vscode/vsce publish -p $VSCE_PAT --no-git-tag-version

      - name: Publish Extension to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: vscode-extension
        run: npx ovsx publish -p $OVSX_PAT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
