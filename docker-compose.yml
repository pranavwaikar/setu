version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: setu_postgres
    environment:
      POSTGRES_DB: setu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "setu" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: setu_api
    # No inline command — the Dockerfile ENTRYPOINT (entrypoint.sh) handles
    # waiting for Postgres, running Prisma, then starting the server.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@postgres:5432/setu?schema=public}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      GATEWAY_API_TOKEN: ${GATEWAY_API_TOKEN:-default-gateway-secret}
      PORT: 4000
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-https://setu.helios-logic.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Uses /health — a lightweight, DB-free liveness probe
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:4000/health" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js build at image-build time.
        # Set TUNNEL_DOMAIN in your environment before deploying.
        NEXT_PUBLIC_TUNNEL_DOMAIN: ${TUNNEL_DOMAIN:-setu.helios-logic.com}
        NEXT_PUBLIC_PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-https://setu.helios-logic.com}
    container_name: setu_dashboard
    environment:
      INTERNAL_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:3000/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: setu_gateway
    environment:
      API_SERVER_URL: http://api:4000
      INTERNAL_API_URL: http://api:4000
      DASHBOARD_URL: http://dashboard:3000
      GATEWAY_API_TOKEN: ${GATEWAY_API_TOKEN:-default-gateway-secret}
      TUNNEL_DOMAIN: ${TUNNEL_DOMAIN:-setu.helios-logic.com}
      PORT: 8080
    ports:
      - "18080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # ── Wildcard tunnel subdomain routing ──────────────────────────────────
      # Routes *.${TUNNEL_DOMAIN} → gateway so tunnel subdomains work.
      # Coolify merges these with its own auto-generated labels on redeploy.
      # TUNNEL_DOMAIN is set via environment variable (default: setu.helios-logic.com).

      # HTTPS wildcard router (port 443)
      # Uses the letsencrypt-dns certresolver (Cloudflare DNS-01 challenge)
      # so that *.${TUNNEL_DOMAIN} gets a valid, browser-trusted cert.
      - "traefik.http.routers.setu-tunnel-https.rule=HostRegexp(`^[a-z0-9-]+[.]${TUNNEL_DOMAIN:-setu.helios-logic.com}$`)"
      - "traefik.http.routers.setu-tunnel-https.entrypoints=https"
      - "traefik.http.routers.setu-tunnel-https.tls=true"
      - "traefik.http.routers.setu-tunnel-https.tls.certresolver=letsencrypt-dns"
      - "traefik.http.routers.setu-tunnel-https.tls.domains[0].main=${TUNNEL_DOMAIN:-setu.helios-logic.com}"
      - "traefik.http.routers.setu-tunnel-https.tls.domains[0].sans=*.${TUNNEL_DOMAIN:-setu.helios-logic.com}"
      - "traefik.http.routers.setu-tunnel-https.service=setu-tunnel-svc"

      # HTTP wildcard router (port 80) — redirected to HTTPS by Coolify's middleware
      - "traefik.http.routers.setu-tunnel-http.rule=HostRegexp(`^[a-z0-9-]+[.]${TUNNEL_DOMAIN:-setu.helios-logic.com}$`)"
      - "traefik.http.routers.setu-tunnel-http.entrypoints=http"
      - "traefik.http.routers.setu-tunnel-http.middlewares=redirect-to-https"
      - "traefik.http.routers.setu-tunnel-http.service=setu-tunnel-svc"

      # Single load-balancer service pointing to the gateway's internal port
      - "traefik.http.services.setu-tunnel-svc.loadbalancer.server.port=8080"

volumes:
  pgdata:
