version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: setu_postgres
    environment:
      POSTGRES_DB: setu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "setu" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: setu_api
    command: sh -c "npx prisma db push && npm run start:prod"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/setu?schema=public
      JWT_SECRET: supersecretjwtkey
      GATEWAY_API_TOKEN: default-gateway-secret
      PORT: 4000
      DASHBOARD_URL: http://127.0.0.1:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: setu_dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: setu_gateway
    environment:
      API_SERVER_URL: http://api:4000
      GATEWAY_API_TOKEN: default-gateway-secret
      TUNNEL_DOMAIN: lvh.me
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
